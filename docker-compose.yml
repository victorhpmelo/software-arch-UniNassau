services:
  postgres:
    image: postgres:15-alpine
    container_name: finanjovem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: finanjovem_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d finanjovem_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - finanjovem

  backend:
    build: ./backend
    container_name: finanjovem_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - finanjovem

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    container_name: finanjovem_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finanjovem

networks:
  finanjovem:
    driver: bridge

volumes:
  postgres_data:
